name: Build Mac App

on:
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pdfplumber pandas openpyxl

      - name: Gerar app para Mac
        run: |
         pyinstaller --onefile --windowed --name "Filtro PDF" app_visual_escuro_windows_mac.py

      - name: Compactar app
        run: |
          cd dist
          zip -r "Filtro PDF Mac.zip" "Filtro PDF.app"

      - name: Enviar arquivo gerado
        uses: actions/upload-artifact@v4
        with:
          name: Filtro-PDF-Mac
          path: dist/Filtro PDF Mac.zip
